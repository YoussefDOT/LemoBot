name: Lemo daily message

on:
  schedule:
    # 00:05 UTC = ~3:05 AM Riyadh time (UTC+3, no DST)
    # Offset 5 minutes past the hour to avoid GitHub's top-of-hour congestion,
    # which is known to silently drop scheduled runs at exactly :00.
    - cron: "5 0 * * *"
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python send_message.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          TELEGRAM_STICKER_ID: ${{ secrets.TELEGRAM_STICKER_ID }}
