name: Lemo daily message

on:
  schedule:
    # Every 10 minutes during 00:00-00:59 UTC (3-4 AM Riyadh, UTC+3, no DST).
    # Redundant on purpose: GitHub can silently drop individual scheduled runs,
    # so this gives ~6 chances per day. send_message.py only actually sends
    # once, the first time it runs after 3 AM Riyadh, then skips the rest.
    - cron: "*/10 0 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Send immediately, ignoring the time window and already-sent guard"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python send_message.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          TELEGRAM_STICKER_ID: ${{ secrets.TELEGRAM_STICKER_ID }}
          FORCE_SEND: ${{ github.event.inputs.force }}
      - name: Save sent-state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Record message sent for today"
          git push
